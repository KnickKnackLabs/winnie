name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GH_TOKEN: ${{ github.token }}
  GITHUB_TOKEN: ${{ github.token }}
  MISE_JOBS: 1

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Install system test dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y genisoimage socat

      - name: Install system test dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cdrtools socat

      - name: Check whitespace
        run: git diff --check

      - name: Run tests
        run: mise run test

      - name: Run codebase lints
        run: codebase lint "$PWD"

      - name: Check README.md is up to date
        uses: KnickKnackLabs/readme@v0.3.1
        with:
          check: true
