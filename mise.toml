[settings]
quiet = true
task_output = "interleave"
experimental = true

[plugins]
shiv = "https://github.com/KnickKnackLabs/vfox-shiv"

[tools]
bats = "1.13.0"
usage = "3.0.0"
gum = "0.17.0"
jq = "1.8.1"
yq = "4.50.1"
coreutils = "0.7.0"
"github:ip7z/7zip" = "26.00"
uv = "0.10.0"
"shiv:codebase" = "0.3"
"shiv:readme" = "0.3"

[_.codebase]
lint = [
  "mise-settings",
  "bats-test-helper",
  "bats-test-task",
  "mcr-scope",
  "or-true",
  "shellcheck",
  "gum-table",
  "caller-pwd-contract",
  "github-actions",
]
