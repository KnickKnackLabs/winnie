# weiner-toy grub.cfg — multiboot auto-detection engine
#
# At boot time, this scans /isos/ for ISO files, mounts each via loopback,
# and generates menu entries based on detected distro family.
#
# Detection order matters: first match wins. More specific checks go first.

set default=0
set timeout=10
set pager=1

# Find the partition labeled WEINERTOY
search --no-floppy --label WEINERTOY --set=root

# Path where ISOs live on the data partition
set isopath="/isos"

# Header
menuentry "══════════ weiner-toy ══════════" {
    true
}

# Scan for ISOs and create boot entries
for isofile in ${isopath}/*.iso ${isopath}/*.ISO; do
    if [ -e "$isofile" ]; then
        # Extract filename for display
        regexp --set=isoname '/isos/(.*)' "$isofile"

        loopback loop "$isofile"

        # Priority 1: Use the ISO's own loopback.cfg if it ships one
        if [ -e "(loop)/boot/grub/loopback.cfg" ]; then
            menuentry "$isoname [loopback.cfg]" "$isofile" {
                set isofile="$2"
                loopback loop "$isofile"
                set iso_path="$isofile"
                export iso_path
                set root=(loop)
                configfile /boot/grub/loopback.cfg
            }

        # Ubuntu / Linux Mint / elementary (Casper-based)
        elif [ -e "(loop)/casper/vmlinuz" ]; then
            menuentry "$isoname [Ubuntu/Casper]" "$isofile" {
                set isofile="$2"
                loopback loop "$isofile"
                linux (loop)/casper/vmlinuz boot=casper iso-scan/filename="$isofile" quiet splash ---
                initrd (loop)/casper/initrd
            }

        # Debian Live / Kali / Tails
        elif [ -e "(loop)/live/vmlinuz" ]; then
            menuentry "$isoname [Debian Live]" "$isofile" {
                set isofile="$2"
                loopback loop "$isofile"
                linux (loop)/live/vmlinuz boot=live findiso="$isofile" quiet splash
                initrd (loop)/live/initrd.img
            }

        # Arch Linux
        elif [ -e "(loop)/arch/boot/x86_64/vmlinuz-linux" ]; then
            menuentry "$isoname [Arch Linux]" "$isofile" {
                set isofile="$2"
                loopback loop "$isofile"
                probe --set=isolabel -l (loop)
                linux (loop)/arch/boot/x86_64/vmlinuz-linux archisolabel="$isolabel" img_dev=/dev/disk/by-label/WEINERTOY img_loop="$isofile"
                initrd (loop)/arch/boot/x86_64/initramfs-linux.img
            }

        # Fedora / RHEL Live
        elif [ -e "(loop)/images/pxeboot/vmlinuz" ]; then
            menuentry "$isoname [Fedora]" "$isofile" {
                set isofile="$2"
                loopback loop "$isofile"
                probe --set=isolabel -l (loop)
                linux (loop)/images/pxeboot/vmlinuz root=live:CDLABEL="$isolabel" rd.live.image iso-scan/filename="$isofile" quiet
                initrd (loop)/images/pxeboot/initrd.img
            }

        # Alpine Linux
        elif [ -e "(loop)/boot/vmlinuz-lts" ]; then
            menuentry "$isoname [Alpine]" "$isofile" {
                set isofile="$2"
                loopback loop "$isofile"
                linux (loop)/boot/vmlinuz-lts iso-scan/filename="$isofile" modules=loop,squashfs,sd-mod,usb-storage quiet
                initrd (loop)/boot/initramfs-lts
            }

        # NixOS
        elif [ -e "(loop)/boot/bzImage" ]; then
            menuentry "$isoname [NixOS]" "$isofile" {
                set isofile="$2"
                loopback loop "$isofile"
                linux (loop)/boot/bzImage findiso="$isofile" quiet
                initrd (loop)/boot/initrd
            }

        # Unknown — show it anyway, try common paths
        else
            menuentry "$isoname [Unknown]" "$isofile" {
                set isofile="$2"
                loopback loop "$isofile"
                # Try the most common kernel locations
                if [ -e "(loop)/vmlinuz" ]; then
                    linux (loop)/vmlinuz iso-scan/filename="$isofile"
                    if [ -e "(loop)/initrd.img" ]; then
                        initrd (loop)/initrd.img
                    fi
                elif [ -e "(loop)/boot/vmlinuz" ]; then
                    linux (loop)/boot/vmlinuz iso-scan/filename="$isofile"
                    if [ -e "(loop)/boot/initrd.img" ]; then
                        initrd (loop)/boot/initrd.img
                    fi
                fi
            }
        fi

        loopback --delete loop
    fi
done

# Utilities
menuentry "── Utilities ──" {
    true
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}

menuentry "GRUB Command Line" {
    commandline
}
